name: Update Google Scholar Stats

permissions:
  contents: write

on:
  schedule:
    - cron: "0 8 * * *"  # daily
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install scholarly
        run: pip install scholarly
      - name: Ensure fallback files exist
        run: |
          set -euo pipefail
          if [ ! -s gs_data.json ]; then
            cat > gs_data.json <<'EOF_JSON'
          {"citedby":0,"publications":{},"publications_by_title":{}}
          EOF_JSON
          fi

          if [ ! -s gs_data_shieldsio.json ]; then
            cat > gs_data_shieldsio.json <<'EOF_JSON'
          {"schemaVersion":1,"label":"citations","message":"0","color":"9cf","namedLogo":"Google Scholar"}
          EOF_JSON
          fi

          if [ ! -s paper_personal_llm_agents_shieldsio.json ]; then
            cat > paper_personal_llm_agents_shieldsio.json <<'EOF_JSON'
          {"schemaVersion":1,"label":"citations","message":"0","color":"9cf","namedLogo":"Google Scholar"}
          EOF_JSON
          fi
      - name: Fetch Google Scholar stats
        timeout-minutes: 10
        run: |
          python - <<'PYEOF'
          import json
          import urllib.parse
          import urllib.request
          import time
          import signal
          from scholarly import scholarly

          AUTHOR_ID = 'ApKD824AAAAJ'
          TARGET_TITLE = "Personal LLM Agents: Insights and Survey about the Capability, Efficiency and Security".lower()
          GS_DATA_PATH = 'gs_data.json'
          GS_BADGE_PATH = 'gs_data_shieldsio.json'
          PAPER_BADGE_PATH = 'paper_personal_llm_agents_shieldsio.json'
          SERPAPI_API_KEY = '5Z9aQpvXj6VJdV3uC4pEGXom'

          class AttemptTimeout(Exception):
              pass

          def _timeout_handler(signum, frame):
              raise AttemptTimeout("scholar fetch timed out")

          signal.signal(signal.SIGALRM, _timeout_handler)

          def load_existing_data():
              try:
                  with open(GS_DATA_PATH, 'r') as f:
                      return json.load(f)
              except FileNotFoundError:
                  return {}

          def write_outputs(total, publications_by_title, publications):
              gs_data = {
                  'citedby': total,
                  'publications': publications,
                  'publications_by_title': publications_by_title,
              }
              with open(GS_DATA_PATH, 'w') as f:
                  json.dump(gs_data, f)

              shieldsio = {
                  "schemaVersion": 1,
                  "label": "citations",
                  "message": str(total),
                  "color": "9cf",
                  "namedLogo": "Google Scholar",
              }
              with open(GS_BADGE_PATH, 'w') as f:
                  json.dump(shieldsio, f)

              target_citations = publications_by_title.get(TARGET_TITLE, {}).get('num_citations', 0)
              paper_shieldsio = {
                  "schemaVersion": 1,
                  "label": "citations",
                  "message": str(target_citations),
                  "color": "9cf",
                  "namedLogo": "Google Scholar",
              }
              with open(PAPER_BADGE_PATH, 'w') as f:
                  json.dump(paper_shieldsio, f)

          def fetch_author():
              author = scholarly.search_author_id(AUTHOR_ID)
              return scholarly.fill(author)

          def fetch_author_serpapi():
              params = {
                  'engine': 'google_scholar_author',
                  'author_id': AUTHOR_ID,
                  'hl': 'en',
                  'num': '100',
                  'api_key': SERPAPI_API_KEY,
              }
              url = 'https://serpapi.com/search.json?' + urllib.parse.urlencode(params)
              with urllib.request.urlopen(url, timeout=45) as response:
                  payload = json.loads(response.read().decode('utf-8'))
              if payload.get('error'):
                  raise RuntimeError(f"SerpApi error: {payload['error']}")
              return payload

          def extract_publications(author, fallback_data):
              publications = {}
              publications_by_title = {}
              for pub in author.get('publications', []):
                  pid = pub.get('author_pub_id', '')
                  citations = pub.get('num_citations', 0)
                  publications[pid] = {'num_citations': citations}
                  title = pub.get('bib', {}).get('title', '').strip().lower()
                  if title:
                      publications_by_title[title] = {
                          'num_citations': citations,
                          'author_pub_id': pid,
                      }

              if publications and publications_by_title:
                  return publications, publications_by_title, False

              return (
                  fallback_data.get('publications', {}),
                  fallback_data.get('publications_by_title', {}),
                  True,
              )

          def extract_from_serpapi(payload, fallback_data):
              cited_by = payload.get('cited_by', {})
              total = None
              for row in cited_by.get('table', []):
                  citations = row.get('citations', {})
                  all_value = citations.get('all')
                  if all_value is not None:
                      total = int(all_value)
                      break

              publications = {}
              publications_by_title = {}
              for pub in payload.get('articles', []):
                  pid = pub.get('citation_id') or pub.get('author_pub_id') or pub.get('title', '')
                  cited = pub.get('cited_by', {})
                  if isinstance(cited, dict):
                      citations = int(cited.get('value', 0) or 0)
                  else:
                      citations = int(cited or 0)
                  publications[pid] = {'num_citations': citations}

                  title = str(pub.get('title', '')).strip().lower()
                  if title:
                      publications_by_title[title] = {
                          'num_citations': citations,
                          'author_pub_id': pid,
                      }

              if publications and publications_by_title:
                  return total, publications, publications_by_title, False
              return (
                  total,
                  fallback_data.get('publications', {}),
                  fallback_data.get('publications_by_title', {}),
                  True,
              )

          existing_data = load_existing_data()

          last_error = None
          for attempt in range(1, 4):
              try:
                  total = 0
                  publications = {}
                  publications_by_title = {}
                  used_fallback_publications = False

                  if SERPAPI_API_KEY:
                      try:
                          payload = fetch_author_serpapi()
                          total, publications, publications_by_title, used_fallback_publications = extract_from_serpapi(
                              payload,
                              existing_data,
                          )
                          if not total:
                              raise RuntimeError("SerpApi returned an empty citedby value")
                          print("Fetched via SerpApi.")
                      except Exception as serpapi_exc:
                          print(f"SerpApi failed, fallback to scholarly: {serpapi_exc}")
                          signal.alarm(150)
                          author = fetch_author()
                          signal.alarm(0)

                          total = author.get('citedby', 0)
                          if not total:
                              raise RuntimeError("scholar returned an empty citedby value")

                          publications, publications_by_title, used_fallback_publications = extract_publications(
                              author,
                              existing_data,
                          )
                          print("Fetched via scholarly fallback.")
                  else:
                      # Hard timeout per attempt to avoid hanging the whole workflow.
                      signal.alarm(150)
                      author = fetch_author()
                      signal.alarm(0)

                      total = author.get('citedby', 0)
                      if not total:
                          raise RuntimeError("scholar returned an empty citedby value")

                      publications, publications_by_title, used_fallback_publications = extract_publications(
                          author,
                          existing_data,
                      )
                      print("Fetched via scholarly.")

                  write_outputs(total, publications_by_title, publications)
                  print(f"Total citations: {total}")
                  if used_fallback_publications:
                      print("Publication list unavailable; preserved previous per-paper citation data.")
                  break
              except Exception as exc:
                  signal.alarm(0)
                  last_error = exc
                  print(f"Attempt {attempt}/3 failed: {exc}")
                  if attempt < 3:
                      time.sleep(12 * attempt)
          else:
              print(f"All attempts failed. Kept previous Scholar data unchanged. Last error: {last_error}")
              raise SystemExit(1)
          PYEOF
      - name: Commit stats to main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gs_data.json gs_data_shieldsio.json paper_personal_llm_agents_shieldsio.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update Google Scholar stats"
          git pull --rebase origin main
          git push origin main
